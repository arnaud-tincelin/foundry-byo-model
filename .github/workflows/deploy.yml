name: Deploy Infrastructure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Azure environment name (azd env)"
        required: false
        default: "production"

permissions:
  id-token: write   # Required for OIDC / federated credentials
  contents: read

env:
  # azd environment name — override via workflow_dispatch input or change default
  AZD_ENV_NAME: ${{ github.event.inputs.environment || 'production' }}

jobs:
  deploy:
    name: Provision & Deploy
    runs-on: ubuntu-latest
    environment: production  # GitHub Environment (for protection rules / secrets)

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2. Install azd
      # ---------------------------------------------------------------
      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      # ---------------------------------------------------------------
      # 3. Log in to Azure via OIDC (federated credentials)
      # ---------------------------------------------------------------
      - name: Log in with Azure (federated credentials)
        run: |
          azd auth login \
            --client-id "${{ secrets.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

      # ---------------------------------------------------------------
      # 4. Provision infrastructure + deploy services
      # ---------------------------------------------------------------
      - name: Provision & Deploy
        run: azd up --no-prompt
        env:
          AZURE_ENV_NAME: ${{ env.AZD_ENV_NAME }}
          AZURE_LOCATION: ${{ secrets.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          APIM_PUBLISHER_EMAIL: ${{ secrets.APIM_PUBLISHER_EMAIL }}
